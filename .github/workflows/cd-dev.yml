
on:
  workflow_dispatch:

env:
  # NOTE: Any non-empty string is regarded as `True`, hence "YES"
  MATS_DEVELOPMENT: "YES"

jobs:
  aws_cdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: "true"
          token: ${{ secrets.INSTRUMENT_DATA_TOKEN }}

      - name: Setup node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install aws-cdk
        run: |
          npm install -g aws-cdk

      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Sync development environment
        run: |
          uv sync --python 3.11 --group dev

      - name: Install Lambda 1B dependencies
        run: |
          uv pip install -r l1b_lambda/requirements.txt

      - name: Verify Lambda wheel-only compatibility (x86_64, cp311)
        run: |
          python -m pip download \
            --only-binary=:all: \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 311 \
            --abi cp311 \
            -r l1b_lambda/level1b/requirements.txt \
            -d /tmp/lambda-wheel-check

      - name: Verify Lambda wheel-only compatibility (arm64, cp311)
        run: |
          python -m pip download \
            --only-binary=:all: \
            --platform manylinux2014_aarch64 \
            --implementation cp \
            --python-version 311 \
            --abi cp311 \
            -r l1b_lambda/level1b/requirements.txt \
            -d /tmp/lambda-wheel-check-arm64

      - name: Build and install MATS L1 Processing
        run: |
          uv build
          uv pip install ./dist/*.whl

      - name: Deploy stacks
        run: |
          cd l1b_lambda
          cdk deploy --all --require-approval never
