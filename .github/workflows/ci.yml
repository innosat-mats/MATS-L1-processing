name: Level1B Lambda CI

on: [push]

jobs:
    lambda_test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version-file: ".python-version"

        - name: Setup uv
          uses: astral-sh/setup-uv@v4

        - name: Sync development environment
          run: |
            uv sync --python "$(cat .python-version)" --group dev
        
        - name: Install Lambda 1B dependencies
          run: |
            uv pip install -r l1b_lambda/requirements.txt

        - name: Verify Lambda wheel-only compatibility (x86_64, cp311)
          run: |
            uv run python -m pip download \
              --only-binary=:all: \
              --platform manylinux2014_x86_64 \
              --implementation cp \
              --python-version 311 \
              --abi cp311 \
              -r l1b_lambda/level1b/requirements.txt \
              -d /tmp/lambda-wheel-check

        - name: Verify Lambda wheel-only compatibility (arm64, cp311)
          run: |
            uv run python -m pip download \
              --only-binary=:all: \
              --platform manylinux2014_aarch64 \
              --implementation cp \
              --python-version 311 \
              --abi cp311 \
              -r l1b_lambda/level1b/requirements.txt \
              -d /tmp/lambda-wheel-check-arm64

        - name: Build and install MATS L1 Processing
          run: |
            uv build
            uv pip install ./dist/*.whl
        
        - name: Run unit tests
          run: |
            uv run tox -c l1b_lambda/tox.ini -e py311

        - name: Run lint checks
          run: |
            uv run tox -c l1b_lambda/tox.ini -e lint

        - name: Run type checks
          run: |
            uv run tox -c l1b_lambda/tox.ini -e ty
