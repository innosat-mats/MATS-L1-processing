# This document defines the position of various files used for the calibration of MATS data. 

title = "Level 1 calibration files for testing this package"

#Folders and parameters for generating the calibration database
[primary_data.linearity]
    folder = "calibration_data/binning_test_20200812/RacFiles_out/"
    starttime = ""
    endtime = ""
    fittype = 'threshold2'
    remove_blanks = 'true'

[primary_data.flatfield]
	flatfieldfolder_cold_unprocessed = "calibration_data/20200330_flatfields_0C/"  # used by read_flatfield_wo_baffle, which is not called by the current make_flatfield pipeline
	baffle_flatfield = "calibration_data/Flatfield20210421/PayloadImages/"
	baffle_flatfield_second = "calibration_data/FlatfieldsIR124UV_210908/PayloadImages/"
	baffle_flatfield_secondIR3 = "calibration_data/BinningFlatfieldsIR3_210910/PayloadImages/"


# Folders and parameters for performing calibration
[darkcurrent]
    folder = 'l1b_lambda/instrument_data/calibration_data/darkcurrent/'
    dc_2D_limit = 0  # limit in counts above which 2D dark current subtraction is done
    default_temp = -15
[flatfield]
    flatfieldfolder = 'l1b_lambda/instrument_data/calibration_data/flatfields/'
[linearity]
	linearity = 'l1b_lambda/instrument_data/calibration_data/linearity/linearity.csv'
[abs_rel_calib]
    abs_rel_calib_constants = 'l1b_lambda/instrument_data/calibration_data/abs_rel_calib/abs_rel_calib_constants.csv'
[pointing]
    qprime = 'l1b_lambda/instrument_data/calibration_data/pointing/'
[artifact]
    nadir = 'l1b_lambda/instrument_data/calibration_data/artifact/mask_op.pkl'
    blank = 'l1b_lambda/instrument_data/calibration_data/artifact/blank.pkl'
[hot_pixels]
    hot_pixels = 'calibration_data/hot_pixels/hpms.db'
    single_events = 'calibration_data/hot_pixels/SE.db'
[photometer]
    thermistor_table = 'l1b_lambda/instrument_data/calibration_data/photometers/AlbedoFM_Thermistors_Temp_vs_bits.mat'
    FM1_spline = 'l1b_lambda/instrument_data/calibration_data/photometers/SignFM1_Rad_raw.pkl'
    FM2_spline = 'l1b_lambda/instrument_data/calibration_data/photometers/SignFM2_Rad_raw.pkl'